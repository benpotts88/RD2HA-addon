name: RD2HA
version: "0.2.2"
slug: rd2ha
description: RainDirector / Tanklevels to Home Assistant MQTT bridge
url: https://github.com/benpotts88/RD2HA-addon
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
map:
  - addon_config:rw
options:
  tanklevels_email: ""
  tanklevels_password: ""
  tanklevels_device_url: "https://tanklevels.co.uk/devices/CHANGE_ME"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  poll_interval_seconds: 900
  playwright_headless: true
  playwright_timeout_ms: 45000
  page_stable_seconds: "1.5"
  page_stable_sample_interval_ms: 500
  mqtt_base_topic: "raindirector/tank"
  ha_discovery_prefix: "homeassistant"
  device_name: "Tank"
  device_id: "tank"
  device_type: "tank_level"
  devices: []
  timezone: "Europe/London"
schema:
  tanklevels_email: str
  tanklevels_password: password
  tanklevels_device_url: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  poll_interval_seconds: int
  playwright_headless: bool
  playwright_timeout_ms: int
  page_stable_seconds: str
  page_stable_sample_interval_ms: int
  mqtt_base_topic: str
  ha_discovery_prefix: str
  device_name: str
  device_id: str
  device_type: list(tank_level|rain_director)
  devices:
    - id: str
      name: str
      url: str
      type: list(tank_level|rain_director)
      base_topic: str?
  timezone: str
